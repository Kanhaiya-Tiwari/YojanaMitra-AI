#Linting and SAST scan
#lint - flake8 & SAST -bundit
name: Code Quality

on: 
    workflow_call:

jobs:
    validate:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11", "3.12", "3.13"]
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: setup python ${{ matrix.python-version}}
              uses: actions/setup-python@v5
              with:
                python-version: ${{ matrix.python-version}}
                
            
            - name: install dependencies
              run: pip install -r requirements.txt

            - name: run linter
              run: |
                echo "Running flake8 on all Python files..."
                echo "Python files found:"
                find . -name "*.py" -not -path "./frontend/*" -not -path "./.venv/*" -not -path "./node_modules/*" | wc -l
                echo "Linting services directory..."
                flake8 services/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
                echo "Linting backend directory..."
                flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
                echo "Linting completed successfully!"

            - name: run SAST
              run: |
                echo "Running bandit security scan on all Python services..."
                bandit -r services/ -f json -o bandit-report.json || true
                bandit -r backend/ -f json -o bandit-backend-report.json || true
                echo "Bandit scan completed!"