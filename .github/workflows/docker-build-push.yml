name: Docker Build & Push 

on: 
  workflow_call:

jobs:
    build-backend:
        runs-on: ubuntu-latest
        strategy:
          matrix:
            service:
              - api-gateway
              - scheme-service
              - user-service
              - chatbot-service
              - eligibility-service
              - notification-service

        steps:
            - name: Code Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKERHUB_USER }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
                
            - name: Build & Push ${{ matrix.service }} to Docker Hub
              uses: docker/build-push-action@v6
              with:
                context: .
                file: ./devops/dockerfiles/${{ matrix.service }}.Dockerfile
                push: true
                no-cache: true
                tags: |
                    ${{ vars.DOCKERHUB_USER }}/yojanamitra-${{ matrix.service }}:${{ github.sha }}
                    ${{ vars.DOCKERHUB_USER }}/yojanamitra-${{ matrix.service }}:latest

    build-frontend:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKERHUB_USER }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
                
            - name: Debug - List frontend directory
              run: |
                echo "Frontend directory contents:"
                ls -la frontend/
                echo "Checking for package.json:"
                if [ -f frontend/package.json ]; then
                  echo "package.json found in frontend/"
                  head -5 frontend/package.json
                else
                  echo "package.json NOT found in frontend/"
                  echo "Root directory contents:"
                  ls -la
                fi
                
            - name: Build & Push frontend to Docker Hub
              uses: docker/build-push-action@v6
              with:
                context: ./frontend
                file: ./devops/dockerfiles/frontend.Dockerfile
                push: true
                no-cache: true
                tags: |
                    ${{ vars.DOCKERHUB_USER }}/yojanamitra-frontend:${{ github.sha }}
                    ${{ vars.DOCKERHUB_USER }}/yojanamitra-frontend:latest