# this will deploy the safe / secure / tested app to Prod server
name: Deploy To Server

on: 
    workflow_call:


jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
            DOCKER_TAG: ${{ github.sha }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: SSH to Prod server & create app folder
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                 echo "Installing required packages & folders"
                 sudo apt-get update && sudo apt-get install docker.io docker-compose-v2 -y
                 sudo usermod -aG docker $USER
                 mkdir -p ~/devops
                 # Remove existing docker-compose.yml (file or directory) before writing a new one
                 rm -rf ~/devops/docker-compose.yml

            - name: Copy docker-compose.prod.yml to server
              uses: appleboy/scp-action@v0.1.4
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                source: "docker-compose.prod.yml"
                target: "~/devops/"

            - name: SSH to Prod server & run the app
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                 echo "Running App"
                 
                 export DOCKERHUB_USER=${{ vars.DOCKERHUB_USER }}
                 export DOCKER_TAG=${{ github.sha }}
                 echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login --username ${{ vars.DOCKERHUB_USER }} --password-stdin
                 
                 # Cleanup all docker-compose files and directories
                 echo "Cleaning up any existing docker-compose files..."
                 rm -rf ~/devops/docker-compose.yml
                 rm -rf ~/devops/docker-compose.yml.tmp
                 
                 # Copy docker-compose.prod.yml from repo
                 mv ~/devops/docker-compose.prod.yml ~/devops/docker-compose.yml
                 
                 # Remove nginx service as config files are missing
                 sed -i '/# Nginx reverse proxy for production/,/^volumes:/{ /# Nginx reverse proxy for production/d; /^volumes:/!d; }' ~/devops/docker-compose.yml
                 sed -i '/^  nginx:/,/^  # Nginx reverse proxy for production/d' ~/devops/docker-compose.yml
                 
                 # Create .env file with necessary variables
                 cat > ~/devops/.env << EOF
                 DOCKERHUB_USER=${DOCKERHUB_USER}
                 DOCKER_TAG=${DOCKER_TAG}
                 POSTGRES_PASSWORD=password
                 POSTGRES_USER=postgres
                 POSTGRES_DB=yojanamitra
                 DATABASE_URL=postgresql://postgres:password@postgres:5432/yojanamitra
                 JWT_SECRET=your-jwt-secret-key
                 SCHEME_SERVICE_URL=http://scheme-service:8000
                 USER_SERVICE_URL=http://user-service:8000
                 ELIGIBILITY_SERVICE_URL=http://eligibility-service:8000
                 CHATBOT_SERVICE_URL=http://chatbot-service:8000
                 NOTIFICATION_SERVICE_URL=http://notification-service:8000
                 NODE_ENV=production
                 API_URL=http://api-gateway:8000
                 NEXT_PUBLIC_API_URL=http://localhost:8000
                 EOF
                 
                 # Verify and deploy
                 if [ -f ~/devops/docker-compose.yml ]; then
                   echo "✅ docker-compose.yml file copied successfully"
                   echo "File size: $(wc -l < ~/devops/docker-compose.yml) lines"
                   cd ~/devops && docker compose down --remove-orphans --volumes && docker compose up -d --force-recreate --pull always
                   # Ensure old network is removed if still present
                   docker network rm devops_default || true
                 else
                   echo "❌ Failed to copy docker-compose.yml file"
                   ls -la ~/devops/
                   exit 1
                 fi
