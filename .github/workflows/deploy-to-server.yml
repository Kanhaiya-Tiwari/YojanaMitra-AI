# this will deploy the safe / secure / tested app to Prod server
name: Deploy To Server

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
      DOCKER_TAG: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH to Prod server & create app folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "Installing required packages & folders"
            sudo apt-get update && sudo apt-get install docker.io docker-compose-v2 -y
            sudo usermod -aG docker $USER
            mkdir -p devops
            # Remove existing docker-compose.yml if it's a directory
            if [ -d ~/devops/docker-compose.yml ]; then
              echo "Removing existing docker-compose.yml directory"
              rm -rf ~/devops/docker-compose.yml
            fi

      - name: Copy the docker-compose file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: ~/devops/docker-compose.yml

      - name: SSH to Prod server & run the app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "Running App"

            export DOCKERHUB_USER=${{ vars.DOCKERHUB_USER }}
            export DOCKER_TAG=${{ github.sha }}
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login --username ${{ vars.DOCKERHUB_USER }} --password-stdin

            # Cleanup any temporary docker-compose files
            echo "Cleaning up temporary docker-compose files..."
            rm -rf ~/devops/docker-compose.yml.tmp

            # Ensure the docker-compose file exists (copied earlier)
            if [ -f ~/devops/docker-compose.yml ]; then
              echo "✅ docker-compose.yml file created successfully"
              echo "File size: $(wc -l < ~/devops/docker-compose.yml) lines"
              cd ~/devops && docker compose down && docker compose up -d --force-recreate --pull always
            else
              echo "❌ Failed to create docker-compose.yml file"
              ls -la ~/devops/
              exit 1
            fi
