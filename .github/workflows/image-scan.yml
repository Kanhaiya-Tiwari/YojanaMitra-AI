name: Image Scan
on:
  workflow_call:

jobs:
  scan-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - frontend
          - api-gateway
          - scheme-service
          - user-service
          - chatbot-service
          - eligibility-service
          - notification-service
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Scan ${{ matrix.service }} Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.DOCKERHUB_USER }}/yojanamitra-${{ matrix.service }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
        continue-on-error: true
      
      - name: Display Scan Summary
        run: |
          echo "=== Trivy Scan Results for ${{ matrix.service }} ==="
          if [ -f 'trivy-results-${{ matrix.service }}.sarif' ]; then
            echo "✅ SARIF file generated successfully"
            echo "📊 Scan completed for image: ${{ vars.DOCKERHUB_USER }}/yojanamitra-${{ matrix.service }}:${{ github.sha }}"
          else
            echo "⚠️ No SARIF file generated - scan may have failed"
          fi
              