name: Image Scan
on:
  workflow_call:

jobs:
     image-scan:
        runs-on: ubuntu-latest
        steps:
          - name: Login to Docker Hub
            uses: docker/login-action@v3
            with:
              username: ${{ vars.DOCKERHUB_USER }}
              password: ${{ secrets.DOCKERHUB_TOKEN }}
          - name: Scan Image
            uses: aquasecurity/trivy-action@master
            with:
              severity: CRITICAL
              exit-code: '1'
              