name: Image Scan
on:
  workflow_call:

jobs:
  scan-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - frontend
          - api-gateway
          - scheme-service
          - user-service
          - chatbot-service
          - eligibility-service
          - notification-service
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Scan ${{ matrix.service }} Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.DOCKERHUB_USER }}/yojanamitra-${{ matrix.service }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: '1'
              