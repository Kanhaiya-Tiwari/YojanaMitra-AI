apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: yojanamitra
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: your-registry/yojanamitra-notification-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: CHATBOT_SERVICE_URL
              value: "http://chatbot-service:8000"
            - name: WHATSAPP_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: yojanamitra-secrets
                  key: WHATSAPP_ACCESS_TOKEN
            - name: WHATSAPP_VERIFY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: yojanamitra-secrets
                  key: WHATSAPP_VERIFY_TOKEN
            - name: WHATSAPP_PHONE_NUMBER_ID
              valueFrom:
                secretKeyRef:
                  name: yojanamitra-secrets
                  key: WHATSAPP_PHONE_NUMBER_ID
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: yojanamitra
spec:
  selector:
    app: notification-service
  ports:
    - port: 8000
      targetPort: 8000

