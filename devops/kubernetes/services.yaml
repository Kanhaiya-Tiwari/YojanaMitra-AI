apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheme-service
  namespace: yojanamitra
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scheme-service
  template:
    metadata:
      labels:
        app: scheme-service
    spec:
      containers:
        - name: scheme-service
          image: your-registry/yojanamitra-scheme-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: yojanamitra-secrets
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: scheme-service
  namespace: yojanamitra
spec:
  selector:
    app: scheme-service
  ports:
    - port: 8000
      targetPort: 8000
---
