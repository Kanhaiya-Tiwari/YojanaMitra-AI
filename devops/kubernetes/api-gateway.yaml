apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: yojanamitra
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: your-registry/yojanamitra-api-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: USER_SERVICE_URL
              value: "http://user-service:8000"
            - name: SCHEME_SERVICE_URL
              value: "http://scheme-service:8000"
            - name: ELIGIBILITY_SERVICE_URL
              value: "http://eligibility-service:8000"
            - name: CHATBOT_SERVICE_URL
              value: "http://chatbot-service:8000"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: yojanamitra
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8000

