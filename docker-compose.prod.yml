services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheme-service:
    image: ${DOCKERHUB_USER}/yojanamitra-scheme-service:${DOCKER_TAG}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  user-service:
    image: ${DOCKERHUB_USER}/yojanamitra-user-service:${DOCKER_TAG}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  eligibility-service:
    image: ${DOCKERHUB_USER}/yojanamitra-eligibility-service:${DOCKER_TAG}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      scheme-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  chatbot-service:
    image: ${DOCKERHUB_USER}/yojanamitra-chatbot-service:${DOCKER_TAG}
    env_file: .env
    depends_on:
      eligibility-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  notification-service:
    image: ${DOCKERHUB_USER}/yojanamitra-notification-service:${DOCKER_TAG}
    env_file: .env
    depends_on:
      chatbot-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  api-gateway:
    image: ${DOCKERHUB_USER}/yojanamitra-api-gateway:${DOCKER_TAG}
    env_file: .env
    depends_on:
      user-service:
        condition: service_healthy
      scheme-service:
        condition: service_healthy
      eligibility-service:
        condition: service_healthy
      chatbot-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ${DOCKERHUB_USER}/yojanamitra-frontend:${DOCKER_TAG}
    env_file: .env
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - api-gateway
    restart: unless-stopped

volumes:
  pgdata:

networks:
  default:
    name: yojanamitra-network
